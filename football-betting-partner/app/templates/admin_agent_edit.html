{% extends "admin_layout.html" %}
{% block title %}管理员 — 修改代理商{% endblock %}
{% block admin_extra_css %}
<style>
  button.primary.admin { background: #1e3a5f; }
  button.primary.admin:hover { background: #152a45; }
  button.secondary { width: 100%; padding: 12px; margin-top: 8px; background: #e2e8f0; color: #475569; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
  button.secondary:hover { background: #cbd5e1; }
  .code-hint.ok { color: #15803d; }
  .code-hint.bad { color: #b91c1c; }
  .code-hint.wait { color: #64748b; }
</style>
{% endblock %}
{% block admin_body %}
<h1>修改代理商</h1>
<p class="muted">修改档案、登录名、推广码、状态或重置密码（留空则不修改密码）。</p>
<div id="form_wrap">
  <p class="muted">加载中…</p>
</div>
<div id="msg" class="msg error" style="display:none;"></div>
<p style="margin-top:20px;"><a class="text-link" href="{{ partner_url_prefix }}/admin/agents/{{ agent_id }}">返回查看</a> · <a class="text-link" href="{{ partner_url_prefix }}/admin/agents">一览</a></p>
{% endblock %}
{% block admin_extra_js %}
<script>
(function () {
  var agentId = {{ agent_id|tojson }};
  var tokenKey = 'partner_admin_jwt';
  var token = localStorage.getItem(tokenKey);
  var hdr = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };
  function showErr(t) {
    var m = document.getElementById('msg');
    m.textContent = t;
    m.style.display = 'block';
  }
  function hideErr() {
    document.getElementById('msg').style.display = 'none';
  }
  function hintWhenNotJson(status) {
    if (status === 404) {
      return '请检查 PARTNER_APPLICATION_PREFIX 是否与浏览器地址中的子路径一致。';
    }
    if (status === 500) {
      return '多为数据库未迁移：请执行 scripts 中的 SQL。';
    }
    return '若使用子路径部署请检查 PARTNER_APPLICATION_PREFIX；否则查看服务日志。';
  }
  function parseJsonResponse(r) {
    return r.text().then(function (text) {
      var j = {};
      try { j = text ? JSON.parse(text) : {}; } catch (e) {
        return { ok: r.ok, status: r.status, j: {}, badBody: true };
      }
      return { ok: r.ok, status: r.status, j: j };
    });
  }
  function validateCnMobile(s) {
    return /^1[3-9]\d{9}$/.test((s || '').trim());
  }
  function validateAgentLoginEmail(s) {
    var t = (s || '').trim();
    if (!t || t.length > 128 || /\s/.test(t)) return false;
    if (t.indexOf('@') < 1 || t.lastIndexOf('@') !== t.indexOf('@')) return false;
    var parts = t.split('@');
    var local = parts[0], domain = parts[1];
    if (!local || !domain || domain.indexOf('.') < 0) return false;
    if (local.length > 64 || domain.length > 63) return false;
    var tok = /^[a-zA-Z0-9._%+\-]+$/;
    if (!tok.test(local)) return false;
    return domain.split('.').every(function (p) { return p && tok.test(p); });
  }
  function validatePasswordPolicy(pw) {
    var p = (pw || '').trim();
    if (!p) return '请输入密码';
    if (/\s/.test(p)) return '密码不能包含空格';
    if (p.length < 8) return '密码至少 8 位';
    if (!/[A-Za-z]/.test(p)) return '密码须包含英文字母';
    if (!/\d/.test(p)) return '密码须包含数字';
    if (!/[!@#$%^&*()_+\-=[\]{}|;:,.<>?/~`'"']/.test(p)) return '密码须包含符号';
    return '';
  }
  function mountForm(a) {
    var html = ''
      + '<input type="hidden" id="ed_agent_id" value="' + String(a.id) + '">'
      + '<label for="ed_login_name">登录名（邮箱）</label>'
      + '<input id="ed_login_name" type="email" autocomplete="off" value="" maxlength="128">'
      + '<label for="ed_agent_code">推广码</label>'
      + '<input id="ed_agent_code" type="text" autocomplete="off" value="">'
      + '<p id="ed_agent_code_hint" class="muted code-hint" style="font-size:12px;margin-top:-8px;"></p>'
      + '<label for="ed_display_name">显示名（可选）</label>'
      + '<input id="ed_display_name" type="text" placeholder="默认可与姓名一致" value="">'
      + '<label for="ed_real_name">用户姓名</label>'
      + '<input id="ed_real_name" type="text" value="">'
      + '<label for="ed_age">年龄</label>'
      + '<input id="ed_age" type="number" min="1" max="120" value="">'
      + '<label for="ed_phone">电话号码</label>'
      + '<input id="ed_phone" type="tel" maxlength="11" value="">'
      + '<label for="ed_payout_channel">支付渠道</label>'
      + '<select id="ed_payout_channel">'
      + '<option value="alipay">支付宝</option>'
      + '<option value="wechat">微信支付</option>'
      + '</select>'
      + '<label for="ed_payout_account">支付账号</label>'
      + '<input id="ed_payout_account" type="text" value="">'
      + '<label for="ed_payout_holder_name">收款真实姓名</label>'
      + '<input id="ed_payout_holder_name" type="text" value="">'
      + '<label for="ed_current_rate">本月分润率（小数）</label>'
      + '<input id="ed_current_rate" type="text" placeholder="如 0.08" value="">'
      + '<label for="ed_status">状态</label>'
      + '<select id="ed_status">'
      + '<option value="active">正常 active</option>'
      + '<option value="disabled">禁用 disabled</option>'
      + '</select>'
      + '<label for="ed_password">新登录密码</label>'
      + '<p class="muted" style="font-size:12px;margin-top:-6px;">留空不修改。填写时须至少 8 位，含字母、数字、符号。</p>'
      + '<input id="ed_password" type="password" autocomplete="new-password" placeholder="不修改请留空；填写后将使该代理商已登录会话失效">'
      + '<button type="button" class="primary admin" id="ed_save">保存修改</button>'
      + '<button type="button" class="secondary" id="ed_cancel">取消（返回查看）</button>';
    document.getElementById('form_wrap').innerHTML = html;
    document.getElementById('ed_login_name').value = a.login_name || '';
    document.getElementById('ed_agent_code').value = a.agent_code || '';
    document.getElementById('ed_display_name').value = a.display_name || '';
    document.getElementById('ed_real_name').value = a.real_name || '';
    document.getElementById('ed_age').value = a.age != null ? String(a.age) : '';
    document.getElementById('ed_phone').value = a.phone || '';
    document.getElementById('ed_payout_channel').value = (a.payout_channel === 'wechat') ? 'wechat' : 'alipay';
    document.getElementById('ed_payout_account').value = a.payout_account || '';
    document.getElementById('ed_payout_holder_name').value = a.payout_holder_name || '';
    document.getElementById('ed_current_rate').value = a.current_rate != null ? String(a.current_rate) : '';
    document.getElementById('ed_status').value = (a.status === 'disabled') ? 'disabled' : 'active';
    document.getElementById('ed_password').value = '';
    var edCodeTimer;
    function runEdAgentCodeCheck() {
      var hint = document.getElementById('ed_agent_code_hint');
      var code = document.getElementById('ed_agent_code').value.trim();
      if (!code) {
        hint.textContent = '';
        hint.className = 'muted code-hint';
        return;
      }
      hint.className = 'muted code-hint wait';
      hint.textContent = '校验中…';
      var url = partnerPath('/api/partner/admin/agents/check-agent-code?code=' + encodeURIComponent(code) + '&exclude_id=' + encodeURIComponent(String(agentId)));
      fetch(url, { headers: { 'Authorization': 'Bearer ' + token } })
        .then(parseJsonResponse)
        .then(function (x) {
          if (!x.j || !x.j.ok) {
            hint.textContent = '';
            hint.className = 'muted code-hint';
            return;
          }
          if (x.j.available) {
            hint.textContent = x.j.message || '可以使用';
            hint.className = 'muted code-hint ok';
          } else {
            hint.textContent = x.j.message || '已被使用';
            hint.className = 'muted code-hint bad';
          }
        })
        .catch(function () {
          hint.textContent = '';
          hint.className = 'muted code-hint';
        });
    }
    document.getElementById('ed_agent_code').addEventListener('blur', function () {
      clearTimeout(edCodeTimer);
      edCodeTimer = setTimeout(runEdAgentCodeCheck, 200);
    });
    runEdAgentCodeCheck();
    document.getElementById('ed_cancel').addEventListener('click', function () {
      window.location.href = partnerPath('/admin/agents/' + agentId);
    });
    document.getElementById('ed_save').addEventListener('click', function () {
      hideErr();
      var ln = document.getElementById('ed_login_name').value.trim();
      if (!validateAgentLoginEmail(ln)) { showErr('登录名须为有效邮箱地址'); return; }
      var ph = document.getElementById('ed_phone').value.trim();
      if (!validateCnMobile(ph)) { showErr('请输入 11 位中国大陆手机号'); return; }
      var pch = document.getElementById('ed_payout_channel').value.trim();
      if (pch !== 'alipay' && pch !== 'wechat') { showErr('请选择支付渠道'); return; }
      var pacct = document.getElementById('ed_payout_account').value.trim();
      if (!pacct) { showErr('请填写支付账号'); return; }
      var pholder = document.getElementById('ed_payout_holder_name').value.trim();
      if (!pholder) { showErr('请填写收款真实姓名'); return; }
      var body = {
        login_name: ln,
        agent_code: document.getElementById('ed_agent_code').value.trim(),
        display_name: document.getElementById('ed_display_name').value.trim(),
        real_name: document.getElementById('ed_real_name').value.trim(),
        age: document.getElementById('ed_age').value,
        phone: ph,
        payout_channel: pch,
        payout_account: pacct,
        payout_holder_name: pholder,
        current_rate: document.getElementById('ed_current_rate').value.trim(),
        status: document.getElementById('ed_status').value
      };
      var pw = document.getElementById('ed_password').value;
      if (pw) {
        var perr = validatePasswordPolicy(pw);
        if (perr) { showErr(perr); return; }
        body.password = pw;
      }
      if (body.current_rate === '') body.current_rate = 0;
      var btn = document.getElementById('ed_save');
      btn.disabled = true;
      fetch(partnerPath('/api/partner/admin/agents/' + agentId), { method: 'PUT', headers: hdr, body: JSON.stringify(body) })
        .then(parseJsonResponse)
        .then(function (x) {
          btn.disabled = false;
          if (x.badBody) {
            showErr('保存失败 HTTP ' + x.status + '：响应非 JSON。' + hintWhenNotJson(x.status));
            return;
          }
          if (x.status === 401) {
            localStorage.removeItem(tokenKey);
            window.location.href = partnerPath('/admin/login');
            return;
          }
          if (!x.ok || !x.j.ok) { showErr(x.j.message || '保存失败'); return; }
          window.location.href = partnerPath('/admin/agents/' + agentId);
        })
        .catch(function () {
          btn.disabled = false;
          showErr('网络错误');
        });
    });
  }
  fetch(partnerPath('/api/partner/admin/agents/' + agentId), { headers: hdr })
    .then(parseJsonResponse)
    .then(function (x) {
      if (x.status === 401) {
        localStorage.removeItem(tokenKey);
        window.location.href = partnerPath('/admin/login');
        return;
      }
      if (x.badBody) {
        document.getElementById('form_wrap').innerHTML = '<p class="muted">加载失败 HTTP ' + x.status + '。</p>';
        return;
      }
      if (!x.j.ok) {
        document.getElementById('form_wrap').innerHTML = '<p class="muted">' + (x.j.message || '代理商不存在') + '</p>';
        return;
      }
      mountForm(x.j.agent);
    })
    .catch(function () {
      document.getElementById('form_wrap').innerHTML = '<p class="muted">网络错误</p>';
    });
})();
</script>
{% endblock %}

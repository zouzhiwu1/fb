{% extends "base.html" %}
{% block title %}注册 - 绿茵战术前瞻{% endblock %}
{% block content %}
  <h1>注册新用户</h1>
  <form id="register-form">
    <label for="username">用户名</label>
    <input type="text" id="username" name="username" placeholder="请输入用户名" required>
    <label for="gender">性别</label>
    <select id="gender" name="gender" required>
      <option value="">请选择</option>
      <option value="男">男</option>
      <option value="女">女</option>
      <option value="其他">其他</option>
    </select>
    <label for="password">密码</label>
    <p class="hint">至少 8 位，须含英文字母、数字和符号（如 ! # $ - _），不能含空格</p>
    <input type="password" id="password" name="password" placeholder="字母+数字+符号" minlength="8" required>
    <label for="phone">手机号码</label>
    <input type="tel" id="phone" name="phone" placeholder="请输入 11 位手机号" minlength="11" maxlength="11" pattern="[0-9]{11}" title="请输入11位数字手机号" required>
    <button type="button" class="secondary" id="btn-send-code">获取验证码</button>
    <p class="hint">验证码会打印在运行 <code>python run.py</code> 的终端里</p>
    <label for="code">短信验证码</label>
    <input type="text" id="code" name="code" placeholder="请输入验证码" maxlength="6" required>
    <label for="email">邮箱地址</label>
    <input type="email" id="email" name="email" placeholder="请输入邮箱" required>
    <button type="submit" class="primary" id="btn-submit">注册</button>
  </form>
  <div id="msg" class="msg" style="display:none;"></div>
  <p class="link-row">已有账号？<a href="/login">去登录</a></p>
{% endblock %}
{% block extra_js %}
<script>
(function() {
  var form = document.getElementById('register-form');
  var btnSubmit = document.getElementById('btn-submit');
  var btnCode = document.getElementById('btn-send-code');
  var msgEl = document.getElementById('msg');
  function showMsg(text, isError) {
    msgEl.textContent = text;
    msgEl.className = 'msg ' + (isError ? 'error' : 'success');
    msgEl.style.display = 'block';
  }
  function isPhoneValid(phone) {
    return /^\d{11}$/.test((phone || '').trim());
  }
  function validatePasswordPolicy(pw) {
    var p = (pw || '').trim();
    if (!p) return '请输入密码';
    if (/\s/.test(p)) return '密码不能包含空格';
    if (p.length < 8) return '密码至少 8 位';
    if (!/[A-Za-z]/.test(p)) return '密码须包含英文字母';
    if (!/\d/.test(p)) return '密码须包含数字';
    if (!/[!@#$%^&*()_+\-=[\]{}|;:,.<>?/~`'"']/.test(p)) return '密码须包含符号';
    return '';
  }
  btnCode.onclick = function() {
    var phone = document.getElementById('phone').value.trim();
    if (!isPhoneValid(phone)) { showMsg('请输入 11 位有效手机号', true); return; }
    btnCode.disabled = true;
    fetch('/api/auth/send-code', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone: phone })
    })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        showMsg(data.message || (data.ok ? '验证码已发送' : '发送失败'), !data.ok);
        if (data.ok) {
          var n = 60;
          var t = setInterval(function() {
            btnCode.textContent = n + ' 秒后重发';
            n--;
            if (n < 0) { clearInterval(t); btnCode.disabled = false; btnCode.textContent = '获取验证码'; }
          }, 1000);
        } else { btnCode.disabled = false; }
      })
      .catch(function() { showMsg('请求失败', true); btnCode.disabled = false; });
  };
  form.onsubmit = function(e) {
    e.preventDefault();
    var username = document.getElementById('username').value.trim();
    var gender = document.getElementById('gender').value;
    var password = document.getElementById('password').value;
    var phone = document.getElementById('phone').value.trim();
    var code = document.getElementById('code').value.trim();
    var email = document.getElementById('email').value.trim();
    if (!username) { showMsg('请输入用户名', true); return; }
    if (!gender) { showMsg('请选择性别', true); return; }
    var pe = validatePasswordPolicy(password);
    if (pe) { showMsg(pe, true); return; }
    if (!isPhoneValid(phone)) { showMsg('请输入 11 位有效手机号', true); return; }
    if (!code) { showMsg('请输入验证码', true); return; }
    if (!email || email.indexOf('@') < 0) { showMsg('请输入有效邮箱', true); return; }
    btnSubmit.disabled = true;
    fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: username, gender: gender, password: password, phone: phone, code: code, email: email })
    })
      .then(function(r) {
        return r.text().then(function(text) {
          var data = {};
          try { data = JSON.parse(text); } catch (e) {}
          if (!r.ok) console.error('注册接口异常', r.status, text);
          return { ok: r.ok, data: data };
        });
      })
      .then(function(result) {
        var data = result.data;
        if (result.ok && data && data.ok) {
          showMsg('注册成功，正在跳转到登录…', false);
          setTimeout(function() { window.location.href = '/login?registered=1'; }, 1500);
        } else {
          showMsg((data && data.message) || '注册失败', true);
          btnSubmit.disabled = false;
        }
      })
      .catch(function(e) {
        console.error('注册请求失败', e);
        showMsg('网络错误，请重试。请打开浏览器控制台(F12)查看详情。', true);
        btnSubmit.disabled = false;
      });
  };
})();
</script>
{% endblock %}
